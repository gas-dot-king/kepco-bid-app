<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입찰 통합 조회 및 분석 프로그램</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="wrap">

  <header>
    <div class="hd-sub">한전 빅데이터 API 연동 · 실시간</div>
    <div class="hd-title">입찰 통합 조회 및 분석 프로그램</div>
    <div class="server-badge" id="serverBadge">● 연결 확인 중...</div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('search')">🔍 공고 조회</button>
    <button class="tab-btn" onclick="switchTab('simulate')">🎯 투찰가 시뮬레이션</button>

  </div>

  <!-- ═══ 공고 조회 탭 ═══ -->
  <div class="tab-content active" id="tab-search">
    <div class="panel">
      <div class="panel-head"><span class="badge">1</span> 검색 조건</div>
      <div class="panel-body">
        <div class="row3">
          <div class="field">
            <label>검색어</label>
            <input type="text" id="q-keyword" value="보온" placeholder="보온, 단열, 보온재...">
          </div>
          <div class="field">
            <label>발주 기관</label>
            <select id="q-company">
              <option value="">전체 계열사</option>
            </select>
          </div>
          <div class="field">
            <label>조회 기간</label>
            <select id="q-days">
              <option value="10">최근 10일</option>
              <option value="25" selected>최근 25일</option>
              <option value="29">최근 29일 (최대)</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary btn-full" onclick="searchBids()">🔍 입찰공고 조회</button>
      </div>
    </div>
    <div id="search-status"></div>
    <div id="search-results"></div>
    <div id="search-pager"></div>
    <div id="analyze-trigger" style="display:none;margin-top:12px;"></div>
  </div>

  <!-- ═══ 시뮬레이션 탭 ═══ -->
  <div class="tab-content" id="tab-simulate">

    <!-- 입력 패널 -->
    <div class="panel">
      <div class="panel-head"><span class="badge">1</span> 시뮬레이션 입력 조건</div>
      <div class="panel-body">

        <div class="row2">
          <!-- 예비가격기초금액 -->
          <div class="field">
            <label>예비가격 기초금액 (원) <span style="font-weight:400;color:var(--ink3);font-size:11px;">VAT 포함</span></label>
            <input type="text" id="s-base" placeholder="예: 401,820,100" oninput="fmtNum(this)">
          </div>

          <!-- 낙찰하한율 -->
          <div class="field">
            <label>낙찰하한율 (%)</label>
            <input type="number" id="s-limit" placeholder="예: 80.495" step="0.001" min="50" max="100">
          </div>

          <!-- 경쟁사 수 -->
          <div class="field">
            <label>경쟁사 수 (개사)</label>
            <input type="number" id="s-competitor" placeholder="예: 5" min="1" max="50" value="5">
          </div>
        </div>

        <!-- 투표 쏠림 · 발전소별 기준 선택 -->
        <div class="field">
          <label>발주기관 / 투표 쏠림 기준</label>
          <div class="plant-group">

            <div class="plant-group-label">▼ 하방 압력 그룹 (예정가 기댓값 &lt; 기초금액 · 방어적 투찰 유리)</div>
            <div class="plant-btns">
              <button type="button" class="plant-btn" data-skew="-0.20" data-name="서부발전" onclick="selectPlant(this)">
                <span class="plant-name">한국서부발전</span>
                <span class="plant-formula">상방 7 / 하방 8</span>
                <span class="plant-dir plant-dir-down">↓ 하방압력</span>
              </button>
              <button type="button" class="plant-btn" data-skew="-0.20" data-name="동서발전" onclick="selectPlant(this)">
                <span class="plant-name">한국동서발전</span>
                <span class="plant-formula">상방 7 / 하방 8</span>
                <span class="plant-dir plant-dir-down">↓ 하방압력</span>
              </button>
              <button type="button" class="plant-btn" data-skew="-0.20" data-name="남동발전" onclick="selectPlant(this)">
                <span class="plant-name">한국남동발전</span>
                <span class="plant-formula">상방 7 / 하방 8</span>
                <span class="plant-dir plant-dir-down">↓ 하방압력</span>
              </button>
            </div>

            <div class="plant-group-label" style="margin-top:10px;">▲ 상방 압력 그룹 (예정가 기댓값 &gt; 기초금액 · 공격적 투찰 유리)</div>
            <div class="plant-btns">
              <button type="button" class="plant-btn" data-skew="0.20" data-name="중부발전" onclick="selectPlant(this)">
                <span class="plant-name">한국중부발전</span>
                <span class="plant-formula">상방 8 / 하방 7</span>
                <span class="plant-dir plant-dir-up">↑ 상방압력</span>
              </button>
              <button type="button" class="plant-btn" data-skew="0.20" data-name="남부발전" onclick="selectPlant(this)">
                <span class="plant-name">한국남부발전</span>
                <span class="plant-formula">상방 8 / 하방 7</span>
                <span class="plant-dir plant-dir-up">↑ 상방압력</span>
              </button>
            </div>


          </div>
          <!-- 선택된 값 표시 -->
          <div class="plant-selected" id="plant-selected-info">발주기관을 선택해주세요</div>
          <!-- 숨겨진 실제 값 전달용 -->
          <input type="hidden" id="s-skew" value="0">
          <input type="hidden" id="s-asymmetric" value="1">
          <input type="hidden" id="s-up-count" value="7">
          <input type="hidden" id="s-down-count" value="8">
        </div>

        <!-- 안전마진 슬라이더 -->
        <div class="field">
          <label>
            안전마진율
            <span class="slider-val" id="s-margin-val">0.03%</span>
          </label>
          <div class="slider-wrap">
            <span class="slider-edge">0.01%</span>
            <input type="range" id="s-margin" min="1" max="30" value="3" step="1"
              oninput="updateMarginLabel(this.value)">
            <span class="slider-edge">0.30%</span>
          </div>
          <div class="slider-hint">낙찰하한율 + 안전마진 = 최소 투찰 기준선</div>
        </div>

        <button class="btn btn-primary btn-full btn-lg" onclick="runSimulation()">
          🎯 10만 회 몬테카를로 시뮬레이션 실행
        </button>
      </div>
    </div>

    <!-- 로딩 -->
    <div id="sim-loading" style="display:none;" class="panel">
      <div class="panel-body">
        <div class="spinner-wrap">
          <div class="spinner"></div>
          <div class="spinner-msg" id="sim-load-msg">시뮬레이션 실행 중... (10만 회)</div>
        </div>
      </div>
    </div>

    <!-- 결과 -->
    <div id="sim-result"></div>

  </div>





</div>
<script src="/js/engine.js"></script>
<script src="/js/simulate.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
