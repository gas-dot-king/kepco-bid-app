<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>입찰 통합 조회 및 분석 프로그램</title>
<link rel="stylesheet" href="/css/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>
<div class="wrap">

  <header>
    <div class="hd-sub">한전 빅데이터 API 연동 · 실시간</div>
    <div class="hd-title">입찰 통합 조회 및 분석 프로그램</div>
    <div class="server-badge" id="serverBadge">● 연결 확인 중...</div>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('search')">🔍 공고 조회</button>
    <button class="tab-btn" onclick="switchTab('simulate')">🎯 투찰가 시뮬레이션</button>
    <button class="tab-btn" onclick="switchTab('history')">📂 과거 데이터</button>

  </div>

  <!-- ═══ 공고 조회 탭 ═══ -->
  <div class="tab-content active" id="tab-search">
    <div class="panel">
      <div class="panel-head"><span class="badge">1</span> 검색 조건</div>
      <div class="panel-body">
        <div class="row3">
          <div class="field">
            <label>검색어</label>
            <input type="text" id="q-keyword" value="보온" placeholder="보온, 단열, 보온재...">
          </div>
          <div class="field">
            <label>발주 기관</label>
            <select id="q-company">
              <option value="">전체 계열사</option>
            </select>
          </div>
          <div class="field">
            <label>조회 기간</label>
            <select id="q-days">
              <option value="10">최근 10일</option>
              <option value="25" selected>최근 25일</option>
              <option value="29">최근 29일 (최대)</option>
            </select>
          </div>
        </div>
        <button class="btn btn-primary btn-full" onclick="searchBids()">🔍 입찰공고 조회</button>
      </div>
    </div>
    <div id="search-status"></div>
    <div id="search-results"></div>
    <div id="search-pager"></div>
    <div id="analyze-trigger" style="display:none;margin-top:12px;"></div>
  </div>

  <!-- ═══ 시뮬레이션 탭 ═══ -->
  <div class="tab-content" id="tab-simulate">

    <!-- 입력 패널 -->
    <div class="panel">
      <div class="panel-head"><span class="badge">1</span> 시뮬레이션 입력 조건</div>
      <div class="panel-body">

        <div class="row2">
          <!-- 예비가격기초금액 -->
          <div class="field">
            <label>예비가격 기초금액 (원) <span style="font-weight:400;color:var(--ink3);font-size:11px;">VAT 포함</span></label>
            <input type="text" id="s-base" placeholder="예: 401,820,100" oninput="fmtNum(this)">
          </div>

          <!-- 낙찰하한율 -->
          <div class="field">
            <label>낙찰하한율 (%)</label>
            <input type="number" id="s-limit" placeholder="예: 80.495" step="0.001" min="50" max="100">
          </div>

          <!-- 경쟁사 수 -->
          <div class="field">
            <label>경쟁사 수 (개사)</label>
            <input type="number" id="s-competitor" placeholder="예: 5" min="1" max="50" value="5">
          </div>

          <!-- 공고명 (참고용) -->
          <div class="field">
            <label>공고명 <span style="font-weight:400;color:var(--ink3)">(참고용)</span></label>
            <input type="text" id="s-title" placeholder="공고 조회에서 자동 입력되거나 직접 입력">
          </div>
        </div>

        <!-- 복수예비가격 방식 -->
        <div class="field">
          <label>복수예비가격 생성 방식</label>
          <div class="radio-group">
            <label class="radio-label">
              <input type="radio" name="s-method" value="symmetric" checked>
              <span class="radio-box">
                <span class="radio-title">방식 A · 균등</span>
                <span class="radio-desc">기초금액 ±2% 범위에서 15개 균등 추첨</span>
              </span>
            </label>
            <label class="radio-label">
              <input type="radio" name="s-method" value="asymmetric">
              <span class="radio-box">
                <span class="radio-title">방식 B · 비대칭</span>
                <span class="radio-desc">+2%쪽 7개 / -2%쪽 8개 고정 추첨</span>
              </span>
            </label>
          </div>
        </div>

        <!-- 투표 쏠림 · 발전소별 기준 선택 -->
        <div class="field">
          <label>발주기관 / 투표 쏠림 기준</label>
          <div class="plant-group">

            <div class="plant-group-label">▼ 하방 압력 그룹 (예정가 기댓값 &lt; 기초금액 · 방어적 투찰 유리)</div>
            <div class="plant-btns">
              <button type="button" class="plant-btn" data-skew="-0.20" data-name="서부발전" onclick="selectPlant(this)">
                <span class="plant-name">한국서부발전</span>
                <span class="plant-formula">하방 8 / 상방 7</span>
                <span class="plant-dir plant-dir-down">↓ 하방압력</span>
              </button>
              <button type="button" class="plant-btn" data-skew="-0.20" data-name="동서발전" onclick="selectPlant(this)">
                <span class="plant-name">한국동서발전</span>
                <span class="plant-formula">하방 8 / 상방 7</span>
                <span class="plant-dir plant-dir-down">↓ 하방압력</span>
              </button>
              <button type="button" class="plant-btn" data-skew="-0.20" data-name="남동발전" onclick="selectPlant(this)">
                <span class="plant-name">한국남동발전</span>
                <span class="plant-formula">하방 8 / 상방 7</span>
                <span class="plant-dir plant-dir-down">↓ 하방압력</span>
              </button>
            </div>

            <div class="plant-group-label" style="margin-top:10px;">▲ 상방 압력 그룹 (예정가 기댓값 &gt; 기초금액 · 공격적 투찰 유리)</div>
            <div class="plant-btns">
              <button type="button" class="plant-btn" data-skew="0.20" data-name="중부발전" onclick="selectPlant(this)">
                <span class="plant-name">한국중부발전</span>
                <span class="plant-formula">하방 7 / 상방 8</span>
                <span class="plant-dir plant-dir-up">↑ 상방압력</span>
              </button>
              <button type="button" class="plant-btn" data-skew="0.20" data-name="남부발전" onclick="selectPlant(this)">
                <span class="plant-name">한국남부발전</span>
                <span class="plant-formula">하방 7 / 상방 8</span>
                <span class="plant-dir plant-dir-up">↑ 상방압력</span>
              </button>
            </div>

            <div class="plant-btns" style="margin-top:10px;">
              <button type="button" class="plant-btn plant-btn-neutral" data-skew="0" data-name="중립" onclick="selectPlant(this)">
                <span class="plant-name">중립 (기타 / 미선택)</span>
                <span class="plant-formula">±2% 균등</span>
                <span class="plant-dir plant-dir-neutral">◆ 중립</span>
              </button>
            </div>

          </div>
          <!-- 선택된 값 표시 -->
          <div class="plant-selected" id="plant-selected-info">선택 없음 · 쏠림 0 (중립)</div>
          <!-- 숨겨진 실제 값 전달용 -->
          <input type="hidden" id="s-skew" value="0">
        </div>

        <!-- 안전마진 슬라이더 -->
        <div class="field">
          <label>
            안전마진율
            <span class="slider-val" id="s-margin-val">0.03%</span>
          </label>
          <div class="slider-wrap">
            <span class="slider-edge">0.01%</span>
            <input type="range" id="s-margin" min="1" max="20" value="3" step="1"
              oninput="updateMarginLabel(this.value)">
            <span class="slider-edge">0.20%</span>
          </div>
          <div class="slider-hint">과거 데이터 보정 ON 시 자동 반영됨</div>
        </div>

        <!-- 과거 데이터 보정 -->
        <div class="field">
          <div class="correction-bar" id="correctionBar">
            <div class="correction-left">
              <div class="correction-title">📊 과거 데이터 오차 보정</div>
              <div class="correction-sub" id="correctionSub">저장된 과거 데이터 없음</div>
            </div>
            <label class="toggle-label">
              <input type="checkbox" id="s-correction" onchange="toggleCorrection()">
              <span class="toggle-track"></span>
            </label>
          </div>
        </div>

        <button class="btn btn-primary btn-full btn-lg" onclick="runSimulation()">
          🎯 10만 회 몬테카를로 시뮬레이션 실행
        </button>
      </div>
    </div>

    <!-- 로딩 -->
    <div id="sim-loading" style="display:none;" class="panel">
      <div class="panel-body">
        <div class="spinner-wrap">
          <div class="spinner"></div>
          <div class="spinner-msg" id="sim-load-msg">시뮬레이션 실행 중... (10만 회)</div>
        </div>
      </div>
    </div>

    <!-- 결과 -->
    <div id="sim-result"></div>

  </div>

  <!-- ═══ 과거 데이터 탭 ═══ -->
  <div class="tab-content" id="tab-history">
    <div class="panel">
      <div class="panel-head"><span class="badge">1</span> 과거 낙찰 데이터 입력</div>
      <div class="panel-body">
        <div class="row2">
          <div class="field">
            <label>공고명</label>
            <input type="text" id="h-title" placeholder="공고명 입력">
          </div>
          <div class="field">
            <label>발주기관</label>
            <input type="text" id="h-org" placeholder="한국남부발전, 한국전력...">
          </div>
          <div class="field">
            <label>예비가격 기초금액 (원)</label>
            <input type="text" id="h-base" placeholder="예: 401,820,100" oninput="fmtNum(this)">
          </div>
          <div class="field">
            <label>예정가격 (원)</label>
            <input type="text" id="h-estimated" placeholder="실제 예정가격" oninput="fmtNum(this)">
          </div>
          <div class="field">
            <label>낙찰금액 (원)</label>
            <input type="text" id="h-bid" placeholder="실제 낙찰금액" oninput="fmtNum(this)">
          </div>
          <div class="field">
            <label>낙찰하한율 (%)</label>
            <input type="number" id="h-limit" placeholder="예: 80.495" step="0.001">
          </div>
          <div class="field">
            <label>낙찰방법</label>
            <select id="h-method">
              <option>최저가낙찰제</option>
              <option>적격심사낙찰제</option>
              <option>협상에 의한 계약</option>
            </select>
          </div>
          <div class="field">
            <label>복수예비가격 방식</label>
            <select id="h-pricemethod">
              <option value="symmetric">방식 A · 균등 (±2%)</option>
              <option value="asymmetric">방식 B · 비대칭 (7상/8하)</option>
            </select>
          </div>
          <div class="field">
            <label>경쟁사 수</label>
            <input type="number" id="h-competitor" placeholder="예: 7" min="1">
          </div>
          <div class="field">
            <label>입찰일</label>
            <input type="date" id="h-date">
          </div>
        </div>
        <div class="field">
          <label>메모</label>
          <input type="text" id="h-memo" placeholder="특이사항, 메모 등">
        </div>
        <button class="btn btn-primary btn-full" onclick="saveHistory()">💾 저장</button>
      </div>
    </div>

    <!-- 통계 요약 -->
    <div id="history-stats"></div>

    <!-- 목록 -->
    <div class="panel">
      <div class="panel-head"><span class="badge">2</span> 누적 데이터 목록</div>
      <div class="panel-body" style="padding:0">
        <div id="history-list"></div>
      </div>
    </div>
  </div>



</div>
<script src="/js/engine.js"></script>
<script src="/js/history.js"></script>
<script src="/js/simulate.js"></script>
<script src="/js/app.js"></script>
</body>
</html>
